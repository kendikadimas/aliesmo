name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ─── 1. Checkout ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── 2. Setup Node & build frontend ────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # ─── 3. Setup PHP & install backend dependencies ────────────────
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, openssl, pdo_mysql, tokenizer, xml, ctype, json, fileinfo, curl, bcmath
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      # ─── 4. Buat .env untuk production ─────────────────────────────
      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          APP_NAME="Aliesmo"
          APP_ENV=production
          APP_KEY=${{ secrets.APP_KEY }}
          APP_DEBUG=false
          APP_URL=${{ secrets.APP_URL }}

          LOG_CHANNEL=stack
          LOG_LEVEL=error

          DB_CONNECTION=mysql
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=3306
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}

          CACHE_STORE=file
          SESSION_DRIVER=file
          QUEUE_CONNECTION=sync

          SESSION_DOMAIN=${{ secrets.SESSION_DOMAIN }}
          SANCTUM_STATEFUL_DOMAINS=${{ secrets.SANCTUM_STATEFUL_DOMAINS }}

          MAIL_MAILER=${{ secrets.MAIL_MAILER }}
          MAIL_HOST=${{ secrets.MAIL_HOST }}
          MAIL_PORT=${{ secrets.MAIL_PORT }}
          MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
          MAIL_ENCRYPTION=${{ secrets.MAIL_ENCRYPTION }}
          MAIL_FROM_ADDRESS=${{ secrets.MAIL_FROM_ADDRESS }}
          MAIL_FROM_NAME="Aliesmo"

          RAJAONGKIR_API_KEY=${{ secrets.RAJAONGKIR_API_KEY }}
          RAJAONGKIR_ORIGIN_CITY=153
          RAJAONGKIR_BASE_URL=https://api.rajaongkir.com/starter

          WHATSAPP_NUMBER=${{ secrets.WHATSAPP_NUMBER }}
          EOF

      # ─── 5. Cache Laravel config & routes ──────────────────────────
      - name: Cache Laravel config
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan event:cache

      # ─── 6. Deploy seluruh project ke ~/aliesmo/ via FTP ───────────
      - name: Deploy Laravel app to ~/aliesmo/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /aliesmo/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/frontend/node_modules/**
            **/frontend/src/**
            **/tests/**
            **/.env.example
            **/DEPLOY.md
            **/README.md
            **/.github/**

      # ─── 7. Deploy isi public/ ke public_html/ via FTP ─────────────
      - name: Deploy public/ to public_html/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./public/
          server-dir: /public_html/
