name: Deploy to cPanel via Git

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Commit
    runs-on: ubuntu-latest

    steps:
      # ─── 1. Checkout ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      # ─── 2. Setup Node & build frontend ────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # ─── 3. Setup PHP & install dependencies ───────────────────────
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, openssl, pdo_mysql, tokenizer, xml, ctype, json, fileinfo, curl, bcmath
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      # ─── 4. Buat .env untuk production ─────────────────────────────
      - name: Create .env file
        run: |
          cat > .env << EOF
          APP_NAME="Aliesmo"
          APP_ENV=production
          APP_KEY=${{ secrets.APP_KEY }}
          APP_DEBUG=false
          APP_URL=${{ secrets.APP_URL }}

          LOG_CHANNEL=stack
          LOG_LEVEL=error

          DB_CONNECTION=mysql
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=3306
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}

          CACHE_STORE=file
          SESSION_DRIVER=file
          QUEUE_CONNECTION=sync

          SESSION_DOMAIN=${{ secrets.SESSION_DOMAIN }}
          SANCTUM_STATEFUL_DOMAINS=${{ secrets.SANCTUM_STATEFUL_DOMAINS }}

          MAIL_MAILER=${{ secrets.MAIL_MAILER }}
          MAIL_HOST=${{ secrets.MAIL_HOST }}
          MAIL_PORT=${{ secrets.MAIL_PORT }}
          MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
          MAIL_ENCRYPTION=${{ secrets.MAIL_ENCRYPTION }}
          MAIL_FROM_ADDRESS=${{ secrets.MAIL_FROM_ADDRESS }}
          MAIL_FROM_NAME="Aliesmo"

          RAJAONGKIR_API_KEY=${{ secrets.RAJAONGKIR_API_KEY }}
          RAJAONGKIR_ORIGIN_CITY=${{ secrets.RAJAONGKIR_ORIGIN_CITY }}
          RAJAONGKIR_BASE_URL=https://rajaongkir.komerce.id/api/v1

          WHATSAPP_NUMBER=${{ secrets.WHATSAPP_NUMBER }}
          EOF

      # ─── 5. Cache Laravel config ────────────────────────────────────
      - name: Cache Laravel config
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan event:cache

      # ─── 6. Commit vendor/ + public/build/ + .env ke repo ──────────
      - name: Commit build artifacts
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          # Force add vendor/ dan public/build/ (di-ignore di .gitignore lokal)
          git add -f vendor/
          git add -f public/build/
          git add -f .env
          git add .

          # Hanya commit kalau ada perubahan
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "deploy: build artifacts [skip ci]"
            git push origin main
          fi

      - name: Deploy complete
        run: echo "Build artifacts committed. cPanel will pull automatically."
