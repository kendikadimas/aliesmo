name: Deploy to cPanel via Git

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Commit
    runs-on: ubuntu-latest

    steps:
      # ─── 1. Checkout ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      # ─── 2. Setup Node & build frontend ────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # ─── 3. Setup PHP & install dependencies ───────────────────────
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, openssl, pdo_mysql, tokenizer, xml, ctype, json, fileinfo, curl, bcmath
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      # ─── 4. Commit vendor/ + public/build/ ke repo ─────────────────
      # .env TIDAK di-commit — harus dibuat manual di server via cPanel File Manager
      - name: Commit build artifacts
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          # Stage semua perubahan dulu, lalu force-add ignored files
          git add .
          git add -f vendor/
          git add -f public/build/

          # Hanya commit kalau ada perubahan
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "deploy: build artifacts [skip ci]"
            git push origin main
          fi

      - name: Deploy complete
        run: echo "Build artifacts committed. Pull from cPanel Git Version Control to deploy."
