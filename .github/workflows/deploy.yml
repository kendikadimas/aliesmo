name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ─── 1. Checkout ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── 2. Setup Node & build assets ──────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --include=dev --include=prod
        working-directory: frontend

      - name: Build assets
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # ─── 3. Setup PHP & install dependencies ───────────────────────
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, openssl, pdo_mysql, tokenizer, xml, ctype, json, fileinfo, curl, bcmath
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      # ─── 4. Deploy public/build/ via FTP ──────────────────────────
      - name: Deploy build assets via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /public_html/public/build/
          local-dir: ./public/build/
          dangerous-clean-slate: true

      # ─── 5. Deploy app code via FTP (incremental, skip heavy dirs) ──
      - name: Deploy app code via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /public_html/
          local-dir: ./
          timeout: 60000
          exclude: |
            **/.git/**
            **/.gitignore
            **/.gitattributes
            **/node_modules/**
            **/frontend/node_modules/**
            **/.env
            **/.env.*
            **/storage/logs/**
            **/storage/framework/cache/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**
            **/vendor/**
            **/public/build/**
            **/.github/**
            **/tests/**
            **/.agents/**
            **/*.md
            **/package.json
            **/package-lock.json
            **/vite.config.js
            **/tailwind.config.js
            **/postcss.config.js

      # ─── 6. Run artisan commands via deploy script ────────────────────
      - name: Upload and run deploy script
        run: |
          echo "Uploading deploy-runner.php via FTP..."
          curl -v --ftp-ssl -u "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
            --upload-file ./public/deploy-runner.php \
            "ftp://${{ secrets.FTP_SERVER }}/public_html/public/deploy-runner.php" 2>&1 || true

          echo "Waiting for file to be available..."
          sleep 5

          echo "Running migrate and optimize:clear..."
          curl -v "https://aliesmo.id/deploy-runner.php?token=${{ secrets.DEPLOY_TOKEN }}" 2>&1 || true

          echo "Done."
