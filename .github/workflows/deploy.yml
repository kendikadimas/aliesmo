name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ─── 1. Checkout ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── 2. Setup Node & build frontend ────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # ─── 3. Setup PHP & install backend dependencies ────────────────
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, openssl, pdo_mysql, tokenizer, xml, ctype, json, fileinfo, curl, bcmath
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      # ─── 4. Buat .env untuk production ─────────────────────────────
      - name: Create .env file
        run: |
          cat > .env << EOF
          APP_NAME="Aliesmo"
          APP_ENV=production
          APP_KEY=${{ secrets.APP_KEY }}
          APP_DEBUG=false
          APP_URL=${{ secrets.APP_URL }}

          LOG_CHANNEL=stack
          LOG_LEVEL=error

          DB_CONNECTION=mysql
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=3306
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}

          CACHE_STORE=file
          SESSION_DRIVER=file
          QUEUE_CONNECTION=sync

          SESSION_DOMAIN=${{ secrets.SESSION_DOMAIN }}
          SANCTUM_STATEFUL_DOMAINS=${{ secrets.SANCTUM_STATEFUL_DOMAINS }}

          MAIL_MAILER=${{ secrets.MAIL_MAILER }}
          MAIL_HOST=${{ secrets.MAIL_HOST }}
          MAIL_PORT=${{ secrets.MAIL_PORT }}
          MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
          MAIL_ENCRYPTION=${{ secrets.MAIL_ENCRYPTION }}
          MAIL_FROM_ADDRESS=${{ secrets.MAIL_FROM_ADDRESS }}
          MAIL_FROM_NAME="Aliesmo"

          RAJAONGKIR_API_KEY=${{ secrets.RAJAONGKIR_API_KEY }}
          RAJAONGKIR_ORIGIN_CITY=153
          RAJAONGKIR_BASE_URL=https://api.rajaongkir.com/starter

          WHATSAPP_NUMBER=${{ secrets.WHATSAPP_NUMBER }}
          EOF

      # ─── 5. Cache Laravel config & routes ──────────────────────────
      - name: Cache Laravel config
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan event:cache

      # ─── 6. Zip seluruh project Laravel (kecuali yang tidak perlu) ──
      - name: Zip Laravel app
        run: |
          zip -r deploy_app.zip . \
            --exclude "*.git*" \
            --exclude "*/.git/*" \
            --exclude "*/node_modules/*" \
            --exclude "*/frontend/src/*" \
            --exclude "*/tests/*" \
            --exclude ".env.example" \
            --exclude "DEPLOY.md" \
            --exclude "README.md" \
            --exclude ".github/*" \
            --exclude "deploy_app.zip"

      # ─── 7. Zip isi public/ untuk public_html ───────────────────────
      - name: Zip public dir
        run: |
          cd public && zip -r ../deploy_public.zip .

      # ─── 8. Generate nama file deploy random + upload via FTP ────────
      - name: Upload deploy script + zips via FTP
        run: |
          DEPLOY_FILENAME="dp_$(echo $RANDOM$RANDOM | md5sum | head -c 12).php"
          echo "DEPLOY_FILENAME=$DEPLOY_FILENAME" >> $GITHUB_ENV

          # Upload deploy script dengan nama random
          curl -s --ftp-create-dirs -T deploy/deploy.php \
            "ftp://${{ secrets.FTP_SERVER }}/public_html/${DEPLOY_FILENAME}" \
            --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}"
          echo "deploy script uploaded as: $DEPLOY_FILENAME"

          # Upload zip files
          curl -s --ftp-create-dirs -T deploy_app.zip \
            "ftp://${{ secrets.FTP_SERVER }}/aliesmo_deploy/deploy_app.zip" \
            --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}"
          echo "deploy_app.zip uploaded"

          curl -s --ftp-create-dirs -T deploy_public.zip \
            "ftp://${{ secrets.FTP_SERVER }}/aliesmo_deploy/deploy_public.zip" \
            --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}"
          echo "deploy_public.zip uploaded"

      # ─── 9. Tunggu file tersedia di server ──────────────────────────
      - name: Wait for files to be available
        run: sleep 5

      # ─── 10. Trigger unzip via HTTP GET ─────────────────────────────
      - name: Trigger deploy unzip
        run: |
          URL="${{ secrets.APP_URL }}/${DEPLOY_FILENAME}?secret=${{ secrets.DEPLOY_SECRET }}&action=unzip"
          echo "Calling: $URL"
          RESPONSE=$(curl -v -s -w "\nHTTP_STATUS:%{http_code}" "$URL" 2>&1)
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "^[*<>{}]" | grep -v "HTTP_STATUS:")
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $BODY"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Deploy unzip failed with status $HTTP_STATUS"
            exit 1
          fi

      # ─── 11. Trigger cleanup (hapus zip + script) ───────────────────
      - name: Trigger deploy cleanup
        run: |
          curl -s "${{ secrets.APP_URL }}/${DEPLOY_FILENAME}?secret=${{ secrets.DEPLOY_SECRET }}&action=cleanup"
