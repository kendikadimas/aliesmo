name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ─── 1. Checkout ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── 2. Setup Node & build assets ──────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --include=dev --include=prod
        working-directory: frontend

      - name: Build assets
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # ─── 3. Setup PHP & install dependencies ───────────────────────
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, openssl, pdo_mysql, tokenizer, xml, ctype, json, fileinfo, curl, bcmath
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      # ─── 4. Deploy semua file via FTP (incremental, skip heavy dirs) ──
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /public_html/
          local-dir: ./
          timeout: 60000
          exclude: |
            **/.git/**
            **/.gitignore
            **/.gitattributes
            **/node_modules/**
            **/frontend/node_modules/**
            **/.env
            **/.env.*
            **/storage/logs/**
            **/storage/framework/cache/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**
            **/vendor/**
            **/.github/**
            **/tests/**
            **/.agents/**
            **/*.md
            **/package.json
            **/package-lock.json
            **/vite.config.js
            **/tailwind.config.js
            **/postcss.config.js

      # ─── 6. Run artisan migrate, storage:link dan optimize:clear ──────
      - name: Run artisan migrate and optimize:clear
        run: |
          echo "Running migrate and optimize:clear via deploy script..."
          curl -s -X POST \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}" \
            "https://aliesmo.id/deploy-runner.php" || true
          echo "Done."
